# MongoDB connection string using .env variables
quarkus.mongodb.connection-string=${MONGO_DB_URL}
quarkus.mongodb.database=${MONGO_DB_DATABASE}
quarkus.mongodb.credentials.username=${MONGO_DB_USER}
quarkus.mongodb.credentials.password=${MONGO_DB_PASSWORD}
quarkus.mongodb.credentials.auth-source=admin

# HTTP configuration for file uploads
quarkus.http.limits.max-body-size=15M
quarkus.http.body.multipart=true

# Custom properties
app.ai.gemini.api-key=${GEMINI_API_KEY}
app.ai.gemini.model-classifier=${GEMINI_MODEL_CLASSIFIER}
app.ai.gemini.model-extractor=${GEMINI_MODEL_EXTRACTOR}
app.storage.directory=${STORAGE_DIRECTORY}

# IA
quarkus.langchain4j.ai.gemini.api-key=${GEMINI_API_KEY}
quarkus.langchain4j.ai.gemini.classify-document.api-key=${GEMINI_API_KEY}
quarkus.langchain4j.ai.gemini.classify-document.chat-model.model-id=gemini-3.1-flash-lite
quarkus.langchain4j.ai.gemini.classify-document.chat-model.temperature=0.0
quarkus.langchain4j.ai.gemini.classify-document.chat-model.log-requests=false
quarkus.langchain4j.ai.gemini.classify-document.chat-model.log-responses=false
## encaminhamento
quarkus.langchain4j.ai.gemini.encaminhamento.api-key=${GEMINI_API_KEY}
quarkus.langchain4j.ai.gemini.encaminhamento.chat-model.model-id=gemini-3.1-flash-lite
quarkus.langchain4j.ai.gemini.encaminhamento.chat-model.temperature=0.0

# Transactional Outbox 
app.inbox.processor.interval=10s
app.inbox.reprocessor.interval=10s
app.outbox.publisher.interval=5s
app.outbox.consumer.interval=5s

quarkus.native.additional-build-args=-H:ReflectionConfigurationFiles=reflection-config.json

#nextcloud.webdav.url=${NEXTCLOUD_HOST,http://localhost}/remote.php/dav/files/${NEXTCLOUD_USER,nextcloud}/
nextcloud.username=${NEXTCLOUD_USER:nextcloud}
nextcloud.app-password=${NEXTCLOUD_PASSWORD:nextcloud}

# Kafka properties
# mp.messaging.incoming.{consumer-name}.{property}
mp.messaging.incoming.document-processing-request.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS}
mp.messaging.incoming.document-processing-request.connector=smallrye-kafka
mp.messaging.incoming.document-processing-request.topic=document-processing-requested
mp.messaging.incoming.document-processing-request.failure-strategy=dead-letter-queue
mp.messaging.incoming.document-processing-request.dead-letter-queue.topic=document-processing-requested-dlq
mp.messaging.incoming.document-processing-request.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.document-processing-request.value.deserializer=br.com.fiap.techchallenge.processor.config.DocumentProcessingRequestedDTODeserializer
mp.messaging.incoming.document-processing-request.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.document-processing-request.value.serializer=br.com.fiap.techchallenge.processor.config.DocumentProcessingRequestedDTOSerializer
## retry
mp.messaging.incoming.document-processing-request.retry-attempts=3
mp.messaging.incoming.document-processing-request.retry-delay=3000
mp.messaging.incoming.document-processing-request.retry-max-delay=30000

# Canal de envio para o Kafka
mp.messaging.outgoing.document-processed-response.connector=smallrye-kafka
mp.messaging.outgoing.document-processed-response.topic=document-processed-response
mp.messaging.outgoing.document-processed-response.value.serializer=br.com.fiap.techchallenge.processor.config.DocumentProcessedResponseDTOSerializer

# Configuração do Consumer Group
mp.messaging.incoming.document-processing-request.group.id=med-text-analytics-processor

# Opcional: Começar a ler do início do tópico se for um novo grupo de consumo
mp.messaging.incoming.document-processing-request.auto.offset.reset=earliest

# Tempo máximo que o consumidor pode ficar sem enviar um sinal de "estou vivo" (heartbeat)
mp.messaging.incoming.document-processing-request.session.timeout.ms=45000


# Disable Quarkus Dev Services to bypass local Docker/Testcontainers requirement
quarkus.kafka.devservices.enabled=false
quarkus.mongodb.devservices.enabled=false

# log
%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c] (%t) %s%e%n

