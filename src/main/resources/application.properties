# Transactional Outbox & Kafka properties
app.outbox.publisher.interval=5s
app.outbox.consumer.interval=5s

# Kafka properties
# mp.messaging.incoming.{consumer-name}.{property}
mp.messaging.incoming.data-extraction.bootstrap.servers=localhost:9092
mp.messaging.incoming.data-extraction.connector=smallrye-kafka
mp.messaging.incoming.data-extraction.topic=images-upload-topic
mp.messaging.incoming.data-extraction.failure-strategy=dead-letter-queue
mp.messaging.incoming.data-extraction.dead-letter-queue.topic=images-upload-dlq
mp.messaging.incoming.data-extraction.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.data-extraction.value.deserializer=br.com.fiap.techchallenge.processor.config.ImagesUploadMessageDTODeserializer
mp.messaging.incoming.data-extraction.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.data-extraction.value.serializer=br.com.fiap.techchallenge.processor.config.ImagesUploadMessageDTOSerializer
## retry
mp.messaging.incoming.data-extraction.retry-attempts=3
mp.messaging.incoming.data-extraction.retry-delay=3000
mp.messaging.incoming.data-extraction.retry-max-delay=30000

# Configuração do Consumer Group
mp.messaging.incoming.data-extraction.group.id=med-text-analytics-processor

# Opcional: Começar a ler do início do tópico se for um novo grupo de consumo
mp.messaging.incoming.data-extraction.auto.offset.reset=earliest

# Tempo máximo que o consumidor pode ficar sem enviar um sinal de "estou vivo" (heartbeat)
mp.messaging.incoming.data-extraction.session.timeout.ms=45000


# Disable Quarkus Dev Services to bypass local Docker/Testcontainers requirement
quarkus.kafka.devservices.enabled=false
quarkus.mongodb.devservices.enabled=false

# log
%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c] (%t) %s%e%n

# resilience
## ClassifyDocumentIAService
quarkus.fault-tolerance.ClassifyDocumentIAService.retry.max-retries=3
quarkus.fault-tolerance.ClassifyDocumentIAService.retry.delay=10
quarkus.fault-tolerance.ClassifyDocumentIAService.retry.delay-unit=seconds
quarkus.fault-tolerance.ClassifyDocumentIAService.retry.backoff.exponential=true
quarkus.fault-tolerance.ClassifyDocumentIAService.retry.jitter=500
quarkus.fault-tolerance.ClassifyDocumentIAService.retry.jitter-unit=millis
quarkus.fault-tolerance.ClassifyDocumentIAService.retry.fail-on=java.net.ConnectException,java.util.concurrent.TimeoutException,org.eclipse.microprofile.faulttolerance.exceptions.TimeoutException,dev.langchain4j.exception.HttpException
quarkus.fault-tolerance.ClassifyDocumentIAService.retry.abort-on=org.eclipse.microprofile.faulttolerance.exceptions.CircuitBreakerOpenException

quarkus.fault-tolerance.ClassifyDocumentIAService.circuit-breaker.request-volume-threshold=4
quarkus.fault-tolerance.ClassifyDocumentIAService.circuit-breaker.failure-ratio=0.5
quarkus.fault-tolerance.ClassifyDocumentIAService.circuit-breaker.delay=30
quarkus.fault-tolerance.ClassifyDocumentIAService.circuit-breaker.delay-unit=seconds

