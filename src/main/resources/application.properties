quarkus.fault-tolerance."br.com.fiap.techchallenge.processor.service.ProcessDocumentRequestService/process".rate-limit.window=1
quarkus.fault-tolerance."br.com.fiap.techchallenge.processor.service.ProcessDocumentRequestService/process".rate-limit.window-unit=Minutes

