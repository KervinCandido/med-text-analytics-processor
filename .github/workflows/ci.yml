name: CI

on:
    pull_request:
        branches:
            - main

    push:
        branches:
            - main

    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-and-test:
        name: Build and test
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Java 25
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: maven

            - name: Grant Maven Wrapper permission
              run: chmod +x mvnw

            - name: Build and test
              run: ./mvnw -B -ntp clean verify
